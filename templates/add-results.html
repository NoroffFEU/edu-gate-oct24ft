<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="author" content="Rebecca Våge Husa"/>
    <meta
      name="description"
      content="The add results page for Edugate. Edugate is a result management system for high schools in Nigeria."/>
      <link rel="stylesheet" href="../dist/output.css" />
    <script src="" defer></script>
    <title>Edugate | Add results</title>
</head>
<body class="bg-gray-100 p-5">
  <header></header>
  <main class="w-full mx-auto mt-6">
    <section class="mb-6">
    <nav class="text-sm">
      <a href="#" class="text-gray-500 hover:text-gray-700">Dashboard</a> &gt;
      <a href="#" class="text-green-600 font-medium">Add Results</a>
    </nav>
  </section>
  <section class="flex flex-col justify-center text-center items-center mt-24 md:mt-10 py-4 ">
    <h1 class="text-black text-center font-Poppins text-[32px] font-bold tracking-wide sm:mb-12 mb-6">Add results</h1>
    <p class="text-neutral-dark-gray font-Roboto sm:text-xl text-sm font-normal sm:tracking-wide sm:mb-12 mb-4">To add results, upload an Excel spreadsheet with this format:</p>
  </section>
    
  <div class="flex">
  <table border="1" class="w-full border border-gray-300 text-left">
      <thead class="bg-gray-200 text-gray-600 uppercase text-xs sm:text-sm lg:text-lg text-center">
        <tr>
          <th class="bg-gray-200 text-gray-600 uppercase pl-0.5 md:pl-4 py-1">#</th>
          <th class="border border-gray-300 pl-0.5 md:pl-4 py-1">A</th>
          <th class="border border-gray-300 pl-0.5 md:pl-4 py-1">B</th>
          <th class="border border-gray-300 pl-0.5 md:pl-4 py-1">C</th>
          <th class="border border-gray-300 pl-0.5 md:pl-4 py-1">D</th>
          <th class="border border-gray-300 pl-0.5 md:pl-4 py-1">E</th>
          <th class="border border-gray-300 pl-0.5 md:pl-4 py-1">F</th>
        </tr>
      </thead>
      <tbody class="text-[10px] sm:text-xs lg:text-base">
        <tr>
          <td class="bg-gray-200 border border-gray-300 pl-0.5 md:pl-4 py-1">1</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-1">school_id</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-1">student_id</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-1">year</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-1">term</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-1">result</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-1">grade</td>
        </tr>
        <tr>
          <td class="bg-gray-200 border border-gray-300 pl-0.5 md:pl-4 py-2">2</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">School ID</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">Student ID</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">Year of Exam</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">Term Number (1-3)</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">Number / Number</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">Exam grade</td>
        </tr>
        <tr>
          <td class="bg-gray-200 border border-gray-300 pl-0.5 md:pl-4 py-2">3</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
        </tr>
        <tr>
          <td class="bg-gray-200 border border-gray-300 pl-0.5 md:pl-4 py-2">4</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
          <td class="bg-white border border-gray-300 pl-0.5 md:pl-4 py-2">#</td>
        </tr>
      </tbody>
    </table>
  </div>


    <div class="flex flex-col items-center justify-center space-y-4">
      <button type="button" class="px-6 py-2 max-w-xs bg-green-500 text-white font-semibold rounded-md hover:bg-green-600 transition mt-6">Upload +</button>
      <button type="button" class="px-6 py-2 max-w-xs bg-white text-blue-500 border-2 border-blue-500 font-semibold rounded-md hover:bg-blue-100 hover:text-blue-700 transition">Back to dashboard</button>
    </div>
  </section>
  </main>
  <footer></footer>
</body>
</html>
