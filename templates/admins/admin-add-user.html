<body class="flex bg-neutral-light-gray">

    <header class="bg-neutral-light-gray text-neutral-dark-gray font-Poppins">

                </li>
                <li>
                  <a href="#" class="flex items-center gap-5 p-3 border-b-2 border-white hover:border-primary">
                    Profile
                    <img class="w-6 h-6" src="../../public/icons/user-circle.png" alt="Profile Icon">

                </li>
                <li>
                  <a href="#" class="flex items-center gap-5 p-3 border-b-2 border-white hover:border-primary">
                    Manage user
                    <img class="w-6 h-6" src="../../public/icons/user-management.png" alt="Manage user icon">
                  </a>
                </li>
                <li>
                  <a href="#" class="flex items-center gap-5 p-3 border-b-2 border-white hover:border-primary">
                    About
                    <img class="w-6 h-6" src="../../public/icons/about.png" alt="About Icon">
                  </a>
                </li>
                <li>
                  <a href="#" class="flex items-center gap-5 p-3 border-b-2 border-white hover:border-primary">
                    Contact
                    <img class="w-6 h-6" src="../../public/icons/contact.png" alt="Contact Icon">
                  </a>
                </li>
                <li>
                  <a href="#" class="flex items-center gap-5 p-3 border-b-2 border-white hover:border-accent-hover">
                    Log out
                    <img class="w-6 h-6" src="../../public/icons/logout.png" alt="Log out Icon">
                  </a>
                </li>
              </ul>

          <ul class="hidden md:flex justify-end mr-10 font-Poppins font-medium">

            <li>

          <!-- User Dropdown -->

            <!-- Hidden Checkbox -->

            <!-- User Icon (Clickable) -->
            <label
                for="dropdown-toggle"
                class="hidden md:flex w-14 h-14 mr-10 cursor-pointer"

                <img src="../../public/icons/user-circle.png" alt="User dropdown">

            <!-- Dropdown Menu -->

  <main class="flex flex-row flex-grow gap-0 m-0"> 
    <section class="flex flex-col box-border border-r-2 border-gray-400 p-5 hidden sm:table-cell pt-20">
        <input type="checkbox" id="nav-right-checkbox" aria-label="nav-right" class="hidden">
        <ul class="flex flex-col justify gap-[41px] justify-around">
        <li><img src="../../public/icons/dashboard.png" alt="" class="w-[41px]"></li>
        <li><img src="../../public/icons/results.png" alt="" class="w-[41px]"></li>
        <li><img src="../../public/icons/user-management.png" alt="" class="w-[41px]"></li>
        <li><img src="../../public/icons/top-students.png" alt="" class="w-[41px]"></li>
        <li><img src="../../public/icons/logout.png" alt="" class="w-[41px]"></li>
      </ul>
      </section>
<section class="flex flex-col w-full gap-12 m-0 pr-[16px] sm:!pr-[80px] border-t-2 border-gray-400 pl-4 pt-5">
    <section>
    <nav>
        <ul class="flex text-neutral-medium-gray gap-6 capitalize ">
          <li><a href="#">dashboard</a></li>
          <li>></li>
          <li aria-current="page" class="hover:cursor-pointer">select user</li>
          <li>></li>
          <li aria-current="page" class="text-primary hover:text-primary-hover hover:cursor-pointer">create user</li>
        </ul>  
      </nav>
    </section> 
      <div class="w-[315px] max-w-2xl m-auto flex flex-col">
        <h2 class="text-neutral-dark-gray text-center font-Poppins m-auto text-[32px] font-bold tracking-wide mb-12 sm:mb-4 pb-4">Create User</h2>
        <p class="text-center text-neutral-dark-gray font-Roboto text-xl sm:text-sm font-normal tracking-wide mb-12 sm:mb-4 pb-8">Insert user information below</p>
        <form action="" class="space-y-6 flex m-auto justify-center">
          <div class="space-y-4 w-[315px]">
            <label class="block text-neutral-dark-gray font-Roboto text-base sm:text-sm font-bold tracking-wide outline-none">
              ID:
              <input type="text" name="id" placeholder="1921840 / Leave empty to generate random" class="w-full p-2 border-2 !border-zinc-300 focus:outline-none focus:!border-primary rounded shadow-inner mt-1 font-thin bg-white h-11">
            </label>

            <label class="block text-neutral-dark-gray font-Roboto text-base sm:text-sm font-bold tracking-wide">
              First name:
              <input type="text" name="first-name" placeholder="Joe" class="w-full p-2 border-2 !border-zinc-300 focus:outline-none focus:!border-primary rounded shadow-inner mt-1 font-thin bg-white h-11">
            </label>

            <label class="block text-neutral-dark-gray font-Roboto text-base sm:text-sm font-bold tracking-wide">
              Last name:
              <input type="text" name="last-name" placeholder="Blogs" class="w-full p-2 border-2 !border-zinc-300 focus:outline-none focus:!border-primary rounded shadow-inner mt-1 font-thin bg-white h-11">
            </label>

            <label class="block text-neutral-dark-gray font-Roboto text-base sm:text-sm font-bold tracking-wide">
              Position:
              <input type="text" name="position" placeholder="Teacher" class="w-full p-2 border-2 !border-zinc-300 focus:outline-none focus:!border-primary rounded shadow-inner mt-1 font-thin bg-white h-11">
            </label>

            <label class="block text-neutral-dark-gray font-Roboto text-base sm:text-sm font-bold tracking-wide">
              Date of Birth:
              <input type="date" name="dob" class="w-full p-2 border-2 !border-zinc-300 focus:outline-none focus:!border-primary rounded shadow-inner mt-1 font-thin bg-white h-11">
            </label>

            <label class="block text-neutral-dark-gray font-Roboto text-base sm:text-sm font-bold tracking-wide">
              Email:
              <input type="email" name="email" placeholder="joeblog2020@edugate.no"
                class="w-full p-2 border-2 !border-zinc-300 focus:outline-none focus:!border-primary rounded shadow-inner mt-1 font-thin bg-white h-11">
            </label>

            <label class="block text-neutral-dark-gray font-Roboto text-base sm:text-sm font-bold tracking-wide">
              School:
              <input type="text" name="school" placeholder="The Academy" class="w-full p-2 border-2 !border-zinc-300 focus:outline-none focus:!border-primary rounded shadow-inner mt-1 font-thin bg-white h-11">
            </label>
          </div>
        </form>
      </div>
      <div class="md:hidden flex flex-col gap-1 justify-between m-auto">
        <button class="flex justify-center primary-button mt-4"> <!-- the custom button styles updated with the new version, will show after merge-->
          Create
        </button>
        <button class="flex justify-center alert-button mt-4 items-center"> <!-- the custom button styles updated with the new version, will show after merge-->
          Abort
        </button>
      </div>
      <div class="hidden md:flex mt-4 space-x-4 m-auto">
        <a href="../select-user.html"><button class="bg-[#4CAF50] text-white px-6 py-2 rounded hover:bg-[#45a049] w-[177px] h-[56px] text-3xl">
          Create
        </button></a>
        <a href="../select-user.html"><button class="bg-[#FF5722] text-white px-6 py-2 rounded hover:bg-[#f4511e] w-[177px] h-[56px] text-3xl">
          Abort
        </button></a>
      </div>

  <footer class="flex justify-end sm:justify-center">
    <img class="sm:hidden p-4 pb-0 w-full" src="../../public/img/Circles_illustration_mobile.png" alt="Edugate footer circles mobile">
    <img class="hidden sm:block shrink-0 mx-4 mt-8" src="../../public/img/circle-footer.png" alt="Edugate footer circles desktop">
  </footer> <!-- updated footer from the contact page, now the media works for mobile and desktop versions -->
