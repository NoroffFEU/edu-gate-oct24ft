<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      rel="icon"
      type="image/x-icon"
      alt="browser tab icon"
      href="/public/assets/icons/favicon/favicon-16x16.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/forms.css" />
    <link rel="stylesheet" href="../css/log-in.css" />
    <script defer src="/src/script/log-in.js"></script>
    <script defer src="/src/script/user.json"></script>
  </head>
  <body>
    <div class="page-wrapper">
      <header>
        <nav>
          <div class="logo">
            <img src="/public/assets/img/logo-header.png" alt="School logo" />
          </div>
          <div class="link-div">
            <a class="about-login" href="" aria-label="Link to about">About</a>
            <a class="contact-login" href="" aria-label="Link to contact"
              >Contact</a
            >
          </div>
        </nav>
      </header>
      <div
        id="success-popup"
        class="popup hidden"
        role="alert"
        aria-live="assertive"
      >
        <div class="popup-content">
          <span class="popup-icon"
            ><img src="/public/assets/img/file-success.svg" alt="success icon"
          /></span>
          <div>
            <strong class="login-success">Success!</strong>
            <p>
              Please check you email for instructions<br />on how to verify your
              account.
            </p>
          </div>
          <span class="popup-close"
            ><img
              src="/public/assets/icons/green-x.png"
              alt="click x to close the popup"
          /></span>
        </div>
      </div>
      <main>
        <section class="login-box">
          <h1>Log in</h1>
          <form>
            <label for="email">Email</label>
            <input
              type="text"
              name="email"
              id="email"
              placeholder="example@mail.com"
              aria-required="true"
              aria-label="write your email address"
              class="form-input"
              required
            />
            <label for="password">Password</label>
            <input
              type="text"
              name="password"
              id="password"
              placeholder="Enter password"
              aria-required="true"
              aria-label="write your password"
              class="form-input"
              required
            />
            <p class="form-text-p">
              Forgot your password? Click
              <a
                class="password-here-link"
                href="/src/pages/placeholder.html"
                aria-label="forgot your password, click here"
                >here</a
              >
            </p>
            <button class="login-button" type="submit">Submit</button>
          </form>
        </section>
      </main>

      <footer>
        <img src="/public/assets/img/circle-footer.png" alt="footer icon" />
      </footer>
    </div>
  </body>
</html>
